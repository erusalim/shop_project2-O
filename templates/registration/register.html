{% extends 'base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px;">
    <h2 class="text-center mb-4" style="color: #00ff80;">Регистрация</h2>
    <div class="card" style="background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(56, 189, 248, 0.2);">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
            </form>
            <p class="mt-3 text-center"><a href="{% url 'login' %}" style="color: #cbd5f5;">Уже есть аккаунт? Войти</a></p>
        </div>
    </div>
</div>
{% endblock %}
