<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Интернет-магазин{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.9) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
        }

        .navbar-brand {
            font-weight: bold;
            color: #38bdf8 !important;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.7);
        }

        .nav-link {
            color: #cbd5f5 !important;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #38bdf8 !important;
            text-shadow: 0 0 8px #38bdf8;
        }

        .container {
            background: rgba(15, 23, 42, 0.6);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            border: none;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.9);
        }

        h1, h2, h3 {
            color: #e0f2fe;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Магазин</a>
            <form class="d-flex ms-3 w-100" method="get" action="{% url 'search' %}">
                <input class="form-control form-control-sm me-2" type="search" name="q" placeholder="Поиск товара" aria-label="Search" value="{{ request.GET.q|default_if_none:'' }}">
                <button class="btn btn-outline-light btn-sm" type="submit">🔍</button>
            </form>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'cart_detail' %}">🛒 Корзина</a>
                {% if request.user.is_authenticated %}
                    <a class="nav-link" href="{% url 'orders:profile' %}">👤 {{ request.user.username }}</a>
                    <a class="nav-link" href="{% url 'orders:my_orders' %}">📦 Мои заказы</a>
                    <a class="nav-link" href="{% url 'logout' %}">Выйти</a>
                {% else %}
                    <a class="nav-link" href="{% url 'login' %}">Войти</a>
                    <a class="nav-link" href="{% url 'register' %}">Регистрация</a>
                {% endif %}
                <a class="nav-link" href="{% url 'admin:index' %}">Админка</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
